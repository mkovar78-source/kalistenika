<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kalistenika Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent-a: #ff4d6d;
    --accent-b: #4dffb4;
    --accent-c: #4d9fff;
    --accent-d: #ffb84d;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --text-muted: #404060;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .app-title span { color: var(--accent-a); }
  .header-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--accent-a); }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* TRAINING DAY SELECTOR */
  .day-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .day-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-btn.active-a { border-color: var(--accent-a); background: rgba(255,77,109,0.08); }
  .day-btn.active-b { border-color: var(--accent-b); background: rgba(77,255,180,0.08); }
  .day-btn.active-c { border-color: var(--accent-c); background: rgba(77,159,255,0.08); }
  .day-btn-label {
    font-size: 18px;
    font-weight: 800;
    display: block;
    margin-bottom: 2px;
  }
  .day-btn.active-a .day-btn-label { color: var(--accent-a); }
  .day-btn.active-b .day-btn-label { color: var(--accent-b); }
  .day-btn.active-c .day-btn-label { color: var(--accent-c); }
  .day-btn-sub {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* EXERCISE CARDS */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .exercise-card.done { border-color: var(--accent-b); opacity: 0.7; }
  .ex-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .ex-name {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
  }
  .ex-target {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ex-note {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 16px 10px;
    line-height: 1.4;
  }
  .ex-last {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent-d);
    padding: 0 16px 10px;
  }
  .ex-last span { color: var(--text-muted); }

  /* SERIES INPUT */
  .series-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 16px 14px;
  }
  .serie-input-wrap {
    text-align: center;
  }
  .serie-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    font-family: var(--mono);
  }
  .serie-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    padding: 10px 4px;
    outline: none;
    -moz-appearance: textfield;
  }
  .serie-input::-webkit-outer-spin-button,
  .serie-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .serie-input:focus { border-color: var(--accent-a); }

  /* DONE BUTTON */
  .ex-done-btn {
    width: calc(100% - 32px);
    margin: 0 16px 14px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ex-done-btn.done {
    background: rgba(77,255,180,0.1);
    border-color: var(--accent-b);
    color: var(--accent-b);
  }

  /* SAVE TRAINING BUTTON */
  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent-a);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.8; }

  /* PROGRESSION PAGE */
  .prog-group { margin-bottom: 24px; }
  .prog-group-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .prog-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .prog-item.current { border-color: var(--accent-d); background: rgba(255,184,77,0.06); }
  .prog-item.completed { opacity: 0.4; }
  .prog-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 18px;
    flex-shrink: 0;
    text-align: center;
  }
  .prog-item.current .prog-num { color: var(--accent-d); font-weight: 700; }
  .prog-variant { font-size: 13px; font-weight: 600; flex: 1; }
  .prog-target {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
  }
  .prog-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .prog-badge.current { background: rgba(255,184,77,0.15); color: var(--accent-d); }
  .prog-badge.done-badge { background: rgba(77,255,180,0.1); color: var(--accent-b); }

  /* HISTORY PAGE */
  .history-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 60px 20px;
    line-height: 1.8;
  }
  .history-empty .big { font-size: 40px; margin-bottom: 12px; }
  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .history-header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .history-day-badge {
    font-size: 12px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-a { background: rgba(255,77,109,0.15); color: var(--accent-a); }
  .badge-b { background: rgba(77,255,180,0.1); color: var(--accent-b); }
  .badge-c { background: rgba(77,159,255,0.1); color: var(--accent-c); }
  .history-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }
  .history-exercises {
    padding: 10px 16px 14px;
  }
  .history-ex-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .history-ex-row:last-child { border-bottom: none; }
  .history-ex-name { color: var(--text-dim); flex: 1; }
  .history-ex-vals {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    display: flex;
    gap: 6px;
  }
  .history-ex-val {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .history-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    margin-left: 8px;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent-b);
    color: #0a0a0f;
    font-weight: 800;
    font-size: 13px;
    padding: 12px 24px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin: 0 16px 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent-b);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

</div>

let currentDay = null;
let doneExercises = {};

function getStorage(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function setStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ═══════════════════════════════════════════════════════════════════ NAV
function showPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (el) el.classList.add('active');
  if (page === 'history') renderHistory();
  if (page === 'progress') renderProgression();
}

// ═══════════════════════════════════════════════════════════════════ DATE
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('sk-SK', { day: 'numeric', month: 'short', year: 'numeric' });
}
function todayISO() { return new Date().toISOString().split('T')[0]; }

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('sk-SK', { weekday: 'short', day: 'numeric', month: 'short' });

// ═══════════════════════════════════════════════════════════════════ TRAINING
function selectDay(day) {
  currentDay = day;
  doneExercises = {};
  ['A','B','C'].forEach(d => {
    const btn = document.getElementById('btn-' + d.toLowerCase());
    btn.className = 'day-btn' + (d === day ? ' active-' + d.toLowerCase() : '');
  });
  const t = TRAININGS[day];
  document.getElementById('trainLabel').textContent = t.name;
  renderExercises(day);
  document.getElementById('saveBtn').style.display = 'block';
}

function getLastTraining(day, exId) {
  const history = getStorage('kt_history', []);
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i].day === day) {
      const ex = history[i].exercises.find(e => e.id === exId);
      if (ex) return ex.series;
    }
  }
  return null;
}

function renderExercises(day) {
  const t = TRAININGS[day];
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  t.exercises.forEach((ex, idx) => {
    const last = getLastTraining(day, ex.id);
    const lastHtml = last
      ? `<div class="ex-last"><span>Minule: </span>${last.map(v => v || '—').join(' / ')}</div>`
      : '';
    const seriesCount = ex.target.match(/^(\d)/)?.[1] || 3;
    let seriesInputs = '';
    for (let i = 0; i < seriesCount; i++) {
      seriesInputs += `
        <div class="serie-input-wrap">
          <div class="serie-label">Séria ${i+1}</div>
          <input class="serie-input" type="number" min="0" max="99" placeholder="0"
            id="ex-${idx}-s${i}" inputmode="numeric">
        </div>`;
    }
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = 'card-' + idx;
    card.innerHTML = `
      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-target">${ex.target}</div>
      </div>
      <div class="ex-note">${ex.note}</div>
      ${lastHtml}
      <div class="series-grid">${seriesInputs}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="bar-${idx}" style="width:0%"></div>
      </div>
      <button class="ex-done-btn" id="done-${idx}" onclick="markDone(${idx}, ${seriesCount})">✓ Hotovo</button>
    `;
    list.appendChild(card);
    // Update bar on input
    for (let i = 0; i < seriesCount; i++) {
      setTimeout(() => {
        const inp = document.getElementById(`ex-${idx}-s${i}`);
        if (inp) inp.addEventListener('input', () => updateBar(idx, seriesCount));
      }, 0);
    }
  });
}

function updateBar(idx, seriesCount) {
  let filled = 0;
  for (let i = 0; i < seriesCount; i++) {
    const v = document.getElementById(`ex-${idx}-s${i}`)?.value;
    if (v && parseInt(v) > 0) filled++;
  }
  const pct = (filled / seriesCount) * 100;
  const bar = document.getElementById('bar-' + idx);
  if (bar) bar.style.width = pct + '%';
}

function markDone(idx, seriesCount) {
  const btn = document.getElementById('done-' + idx);
  const card = document.getElementById('card-' + idx);
  const isDone = btn.classList.contains('done');
  if (isDone) {
    btn.classList.remove('done');
    btn.textContent = '✓ Hotovo';
    card.classList.remove('done');
    doneExercises[idx] = false;
  } else {
    btn.classList.add('done');
    btn.textContent = '✓ Dokončené';
    card.classList.add('done');
    doneExercises[idx] = true;
    document.getElementById('bar-' + idx).style.width = '100%';
  }
}

function saveTraining() {
  if (!currentDay) return;
  const t = TRAININGS[currentDay];
  const exercises = t.exercises.map((ex, idx) => {
    const seriesCount = ex.target.match(/^(\d)/)?.[1] || 3;
    const series = [];
    for (let i = 0; i < seriesCount; i++) {
      series.push(document.getElementById(`ex-${idx}-s${i}`)?.value || '');
    }
    return { id: ex.id, name: ex.name, series };
  });
  const entry = { date: todayISO(), day: currentDay, exercises };
  const history = getStorage('kt_history', []);
  history.push(entry);
  setStorage('kt_history', history);
  showToast('Tréning uložený! 💪');
  selectDay(currentDay);
}

// ═══════════════════════════════════════════════════════════════════ PROGRESSION
function getProgLevel(key) { return getStorage('kt_prog_' + key, 0); }
function setProgLevel(key, level) { setStorage('kt_prog_' + key, level); }

function renderProgression() {
  ['kliky','pritahy','drepy','core'].forEach(key => {
    const prog = PROGRESSION[key];
    const current = getProgLevel(key);
    const container = document.getElementById('prog-' + key);
    container.innerHTML = '';
    prog.levels.forEach((level, idx) => {
      const isCurrent = idx === current;
      const isCompleted = idx < current;
      const div = document.createElement('div');
      div.className = 'prog-item' + (isCurrent ? ' current' : '') + (isCompleted ? ' completed' : '');
      div.innerHTML = `
        <div class="prog-num">${isCompleted ? '✓' : idx + 1}</div>
        <div class="prog-variant">${level.name}</div>
        <div class="prog-target">${level.target}</div>
        ${isCurrent ? '<span class="prog-badge current">AKTUÁLNY</span>' : ''}
        ${isCompleted ? '<span class="prog-badge done-badge">SPLNENÝ</span>' : ''}
      `;
      if (isCurrent && idx < prog.levels.length - 1) {
        div.title = 'Klikni keď splníš';
        div.style.cursor = 'pointer';
        div.addEventListener('click', () => {
          if (confirm(`Splnil si: "${level.name}"?\n${level.target}`)) {
            setProgLevel(key, current + 1);
            renderProgression();
            showToast('Postup! Ďalší level odomknutý 🔓');
          }
        });
      }
      container.appendChild(div);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════ HISTORY
function renderHistory() {
  const history = getStorage('kt_history', []);
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if (history.length === 0) {
    container.innerHTML = `<div class="history-empty"><div class="big">📋</div>Zatiaľ žiadna história.<br>Odtrénuj prvý tréning a<br>ulož výsledky.</div>`;
    return;
  }
  [...history].reverse().forEach((entry, rIdx) => {
    const idx = history.length - 1 - rIdx;
    const t = TRAININGS[entry.day];
    const div = document.createElement('div');
    div.className = 'history-entry';
    const exRows = entry.exercises.map(ex => {
      const vals = ex.series.map(v => `<span class="history-ex-val">${v || '—'}</span>`).join('');
      return `<div class="history-ex-row">
        <span class="history-ex-name">${ex.name}</span>
        <div class="history-ex-vals">${vals}</div>
      </div>`;
    }).join('');
    div.innerHTML = `
      <div class="history-header">
        <span class="history-day-badge badge-${entry.day.toLowerCase()}">Tréning ${entry.day} — ${t?.name?.split('—')[1]?.trim() || ''}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="history-date">${formatDate(entry.date)}</span>
          <button class="history-delete" onclick="deleteEntry(${idx})" title="Vymazať">✕</button>
        </div>
      </div>
      <div class="history-exercises">${exRows}</div>
    `;
    container.appendChild(div);
  });
}

function deleteEntry(idx) {
  if (!confirm('Vymazať tento záznam?')) return;
  const history = getStorage('kt_history', []);
  history.splice(idx, 1);
  setStorage('kt_history', history);
  renderHistory();
  showToast('Záznam vymazaný');
}

// ═══════════════════════════════════════════════════════════════════ TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
selectDay('A');
</script>
