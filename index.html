<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KaliTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0c0e;
  --panel:    #141417;
  --card:     #1a1a1f;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --accent:   #e8ff47;
  --accent2:  #ff4757;
  --accent3:  #47c2ff;
  --accent4:  #ff8c42;
  --text:     #f0f0f5;
  --muted:    #6b6b80;
  --dim:      #3a3a4a;
  --mono:     'DM Mono', monospace;
  --head:     'Cabinet Grotesk', sans-serif;
  --body:     'Cabinet Grotesk', sans-serif;
  --red:      #ff4757;
  --green:    #2ecc71;
  --col-a:    #ff4757;
  --col-b:    #47c2ff;
  --col-c:    #ff8c42;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
  max-width: 430px;
  margin: 0 auto;
}

/* ── HEADER ── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,12,14,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.logo-wrap { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.app-title {
  font-family: var(--head);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: -0.5px;
  color: var(--text);
}
.app-title span { color: var(--accent); }

.header-right { text-align: right; }
.header-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.header-streak {
  font-family: var(--head);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  margin-top: 1px;
}

/* ── NAV ── */
.nav-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

.nav-tab {
  padding: 12px 4px 10px;
  text-align: center;
  font-family: var(--head);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.nav-tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-tab.active { color: var(--text); }
.nav-tab.active::after { opacity: 1; }
.nav-tab-icon { font-size: 16px; display: block; margin-bottom: 3px; }

/* ── PAGES ── */
.page { display: none; padding: 16px; padding-bottom: 32px; }
.page.active { display: block; }

/* ── DAY SELECTOR ── */
.day-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.day-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 8px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.day-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.2s;
}
.day-btn.sel-a { border-color: var(--col-a); color: var(--col-a); background: rgba(255,71,87,0.08); }
.day-btn.sel-b { border-color: var(--col-b); color: var(--col-b); background: rgba(71,194,255,0.08); }
.day-btn.sel-c { border-color: var(--col-c); color: var(--col-c); background: rgba(255,140,66,0.08); }
.day-btn.sel-a::before, .day-btn.sel-b::before, .day-btn.sel-c::before { opacity: 1; }

.day-letter {
  font-family: var(--head);
  font-size: 28px;
  font-weight: 900;
  display: block;
  margin-bottom: 4px;
  line-height: 1;
}
.day-btn:not(.sel-a):not(.sel-b):not(.sel-c) .day-letter { color: var(--text); }
.day-sub {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}
.day-btn.sel-a .day-sub { color: var(--col-a); opacity: 0.8; }
.day-btn.sel-b .day-sub { color: var(--col-b); opacity: 0.8; }
.day-btn.sel-c .day-sub { color: var(--col-c); opacity: 0.8; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  padding-left: 2px;
}

/* ── LEVEL BADGE ── */
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 6px;
  background: rgba(232,255,71,0.1);
  color: var(--accent);
  border: 1px solid rgba(232,255,71,0.2);
  vertical-align: middle;
}

/* ── EXERCISE CARDS ── */
.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.25s, opacity 0.25s;
}
.exercise-card.done {
  border-color: rgba(46,204,113,0.3);
  opacity: 0.6;
}

.ex-top {
  padding: 14px 16px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.ex-name {
  font-family: var(--head);
  font-size: 15px;
  font-weight: 800;
  line-height: 1.3;
  flex: 1;
}

.ex-target {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  background: rgba(232,255,71,0.08);
  border: 1px solid rgba(232,255,71,0.15);
  padding: 4px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.ex-note {
  font-size: 11px;
  color: var(--muted);
  padding: 6px 16px 0;
  line-height: 1.5;
}

.ex-last {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent4);
  padding: 4px 16px 0;
}
.ex-last span { color: var(--dim); }

/* ── SERIES INPUTS ── */
.series-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px 16px 8px;
}

.serie-wrap { text-align: center; }
.serie-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}

.serie-input {
  width: 100%;
  background: var(--panel);
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  text-align: center;
  padding: 12px 4px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -moz-appearance: textfield;
}
.serie-input::-webkit-outer-spin-button,
.serie-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.serie-input:focus {
  border-color: var(--accent);
  background: rgba(232,255,71,0.04);
}

/* ── PROGRESS BAR ── */
.prog-bar-wrap {
  height: 3px;
  background: var(--dim);
  margin: 0 16px 10px;
  border-radius: 3px;
  overflow: hidden;
}
.prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── TIMER BTN ── */
.timer-btn {
  width: calc(100% - 32px);
  margin: 0 16px 8px;
  padding: 10px;
  background: rgba(232,255,71,0.05);
  border: 1px solid rgba(232,255,71,0.15);
  border-radius: 12px;
  color: var(--accent);
  font-family: var(--head);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background 0.2s;
}
.timer-btn:active { background: rgba(232,255,71,0.1); }

/* ── DONE BTN ── */
.ex-done-btn {
  width: calc(100% - 32px);
  margin: 0 16px 16px;
  padding: 11px;
  background: transparent;
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  color: var(--muted);
  font-family: var(--head);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.ex-done-btn.done {
  background: rgba(46,204,113,0.1);
  border-color: rgba(46,204,113,0.4);
  color: var(--green);
}

/* ── SAVE BTN ── */
.save-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  border-radius: 16px;
  color: #0c0c0e;
  font-family: var(--head);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s, transform 0.1s;
}
.save-btn:active { opacity: 0.85; transform: scale(0.99); }

/* ── TIMER OVERLAY ── */
.timer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.timer-overlay.show { display: flex; }

.timer-box {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 32px;
  padding: 36px 48px 32px;
  text-align: center;
  min-width: 280px;
}

.timer-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* SVG Ring Timer */
.timer-ring-wrap {
  position: relative;
  width: 160px;
  height: 160px;
  margin: 0 auto 24px;
}
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--dim); stroke-width: 6; }
.timer-ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.3s;
}
.timer-ring-progress.done-ring { stroke: var(--green); }
.timer-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.timer-count {
  font-family: var(--head);
  font-size: 52px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -2px;
}
.timer-count.done-c { color: var(--green); }
.timer-sec-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

.timer-actions { display: flex; gap: 10px; justify-content: center; }

.timer-skip {
  padding: 12px 22px;
  background: transparent;
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  color: var(--muted);
  font-family: var(--head);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.timer-stop {
  padding: 12px 22px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: #0c0c0e;
  font-family: var(--head);
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
}

/* ── PROG GROUP METER ── */
.prog-group-meter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.prog-meter-bar {
  width: 60px;
  height: 4px;
  background: var(--dim);
  border-radius: 4px;
  overflow: hidden;
}
.prog-meter-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 4px;
  transition: width 0.4s ease;
}
.prog-meter-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
}

/* ── MINULE CHIP ── */
.ex-last-chips {
  display: flex;
  gap: 5px;
  padding: 5px 16px 0;
  flex-wrap: wrap;
  align-items: center;
}
.ex-last-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.ex-last-chip {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: rgba(232,255,71,0.08);
  border: 1px solid rgba(232,255,71,0.18);
  padding: 2px 8px;
  border-radius: 20px;
}

/* ── STATS SUMMARY ── */
.stats-summary {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stats-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
}
.stats-card-val {
  font-family: var(--head);
  font-size: 26px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}
.stats-card-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── PROGRESSION ── */
.prog-group { margin-bottom: 24px; }

.prog-group-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.prog-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 6px;
  transition: all 0.2s;
}
.prog-item.current {
  border-color: rgba(232,255,71,0.3);
  background: rgba(232,255,71,0.05);
  cursor: pointer;
}
.prog-item.current:active { transform: scale(0.99); }
.prog-item.completed { opacity: 0.3; }

.prog-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  width: 18px;
  flex-shrink: 0;
  text-align: center;
}
.prog-item.current .prog-num { color: var(--accent); font-weight: 500; }
.prog-item.completed .prog-num { color: var(--green); }

.prog-variant {
  font-family: var(--head);
  font-size: 13px;
  font-weight: 700;
  flex: 1;
}
.prog-target {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-align: right;
}

.prog-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}
.badge-cur {
  background: rgba(232,255,71,0.1);
  color: var(--accent);
  border: 1px solid rgba(232,255,71,0.2);
}
.badge-done {
  background: rgba(46,204,113,0.1);
  color: var(--green);
  border: 1px solid rgba(46,204,113,0.2);
}

/* ── HISTORY ── */
.history-empty {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 60px 20px;
  line-height: 2;
}
.history-empty .big { font-size: 48px; display: block; margin-bottom: 12px; }

.history-entry {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 10px;
  overflow: hidden;
}

.history-hdr {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.hist-badge {
  font-family: var(--head);
  font-size: 12px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
}
.badge-a { background: rgba(255,71,87,0.15); color: var(--col-a); }
.badge-b { background: rgba(71,194,255,0.12); color: var(--col-b); }
.badge-c { background: rgba(255,140,66,0.12); color: var(--col-c); }

.hist-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.hist-exercises { padding: 8px 16px 12px; }

.hist-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.hist-row:last-child { border-bottom: none; }
.hist-name { color: var(--muted); flex: 1; }
.hist-vals { font-family: var(--mono); font-size: 10px; display: flex; gap: 4px; }
.hist-val {
  background: var(--panel);
  padding: 2px 6px;
  border-radius: 5px;
  color: var(--text);
}
.hist-del {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 6px;
  margin-left: 8px;
  border-radius: 6px;
  transition: color 0.2s;
}
.hist-del:hover { color: var(--accent2); }

/* ── CHART ── */
.chart-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 16px;
}
.chart-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 14px;
}
.chart-select {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--head);
  font-size: 13px;
  font-weight: 700;
  padding: 10px 12px;
  outline: none;
  margin-bottom: 16px;
  cursor: pointer;
}
canvas { width: 100% !important; border-radius: 10px; }
.chart-empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 32px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #0c0c0e;
  font-family: var(--head);
  font-weight: 900;
  font-size: 13px;
  padding: 12px 24px;
  border-radius: 30px;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 0 16px 12px;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <div class="app-title">KALI<span>TRACK</span></div>
  </div>
  <div class="header-right">
    <div class="header-date" id="headerDate"></div>
    <div class="header-streak" id="headerStreak"></div>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showPage('train',this)">
    <span class="nav-tab-icon">🏋️</span>Tréning
  </div>
  <div class="nav-tab" onclick="showPage('progress',this)">
    <span class="nav-tab-icon">📈</span>Progress

// ═══════════════════════════════ STORAGE
function gS(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }
function sS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
function getProgLevel(key){ return gS('kt_prog_'+key, 0); }
function setProgLevel(key, lv){ sS('kt_prog_'+key, lv); }

// ═══════════════════════════════ RESOLVE EXERCISE
function resolveExercise(exDef) {
  if (exDef.id) {
    return { id: exDef.id, name: exDef.name, target: exDef.target, note: exDef.note, series: exDef.series || 3 };
  }
  const group = PROG_DEFS[exDef.progGroup];
  const currentLevel = getProgLevel(exDef.progGroup);
  const levelIndex = Math.min(currentLevel + (exDef.offset || 0), group.levels.length - 1);
  const level = group.levels[levelIndex];
  return {
    id: exDef.progGroup + '_' + levelIndex,
    name: level.name,
    target: level.target,
    note: exDef.note,
    series: level.serie || 3,
    progGroup: exDef.progGroup,
    levelIndex,
    isProgLinked: true,
  };
}

// ═══════════════════════════════ NAV
function showPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if (el) el.classList.add('active');
  sS('kt_lastPage', page);
  if (page==='history') renderHistory();
  if (page==='progress') renderProgression();
  if (page==='stats') { renderStatsSummary(); populateChartSelect(); renderChart(); }
}

function renderStatsSummary() {
  const history = gS('kt_history', []);
  const total = history.length;
  const streak = calcStreak();
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  const last7 = history.filter(h => new Date(h.date) >= sevenDaysAgo).length;
  const el = document.getElementById('statsSummary');
  if (!el) return;
  el.innerHTML = `
    <div class="stats-card">
      <div class="stats-card-val">${total}</div>
      <div class="stats-card-label">Celkom</div>
    </div>
    <div class="stats-card">
      <div class="stats-card-val">${last7}</div>
      <div class="stats-card-label">7 dní</div>
    </div>
    <div class="stats-card">
      <div class="stats-card-val" style="color:var(--accent2)">${streak}🔥</div>
      <div class="stats-card-label">Séria</div>
    </div>
  `;
}

// Header
const now = new Date();
document.getElementById('headerDate').textContent = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'short'});

// Streak
function calcStreak() {
  const history = gS('kt_history', []);
  if (!history.length) return 0;
  const dates = [...new Set(history.map(h=>h.date))].sort().reverse();
  let streak = 0;
  let today = new Date(); today.setHours(0,0,0,0);
  for (let i=0; i<dates.length; i++) {
    const d = new Date(dates[i]); d.setHours(0,0,0,0);
    const diff = Math.round((today - d) / 86400000);
    if (diff === i || diff === i+1) streak++;
    else break;
  }
  return streak;
}
const streak = calcStreak();
if (streak > 0) document.getElementById('headerStreak').textContent = `🔥 ${streak} dni v sérii`;

function todayISO(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('sk-SK',{day:'numeric',month:'short',year:'numeric'}); }

// ═══════════════════════════════ TRAINING
let currentDay = null;
let resolvedExercises = [];
let doneMap = {};

function selectDay(day) {
  currentDay = day;
  doneMap = {};
  ['A','B','C'].forEach(d => {
    const btn = document.getElementById('btn-'+d.toLowerCase());
    btn.className = 'day-btn' + (d===day ? ' sel-'+d.toLowerCase() : '');
  });
  const t = TRAINING_STRUCTURE[day];
  document.getElementById('trainLabel').textContent = t.name;
  resolvedExercises = t.exercises.map(ex => resolveExercise(ex));
  renderExercises();
  document.getElementById('saveBtn').style.display = 'block';
}

function getLastSeries(day, exId) {
  const history = gS('kt_history', []);
  for (let i = history.length-1; i >= 0; i--) {
    if (history[i].day === day) {
      const ex = history[i].exercises.find(e => e.id === exId);
      if (ex) return ex.series;
    }
  }
  return null;
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  resolvedExercises.forEach((ex, idx) => {
    const last = getLastSeries(currentDay, ex.id);
    let lastHtml = '';
    if (last && last.some(v=>v)) {
      const chips = last.map((v,i) =>
        `<span class="ex-last-chip">${v||'—'}</span>`
      ).join('');
      lastHtml = `<div class="ex-last-chips"><span class="ex-last-label">Minule:</span>${chips}</div>`;
    }
    const progBadge = ex.isProgLinked
      ? `<span class="level-badge">Lv ${ex.levelIndex+1}</span>` : '';

    let inputs = '';
    for (let i=0; i<ex.series; i++) {
      const hint = last && last[i] ? `placeholder="${last[i]}"` : `placeholder="—"`;
      inputs += `<div class="serie-wrap">
        <div class="serie-label">Séria ${i+1}</div>
        <input class="serie-input" type="number" min="0" max="99" ${hint}
          id="ex-${idx}-s${i}" inputmode="numeric">
      </div>`;
    }

    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = 'card-'+idx;
    card.innerHTML = `
      <div class="ex-top">
        <div class="ex-name">${ex.name}${progBadge}</div>
        <div class="ex-target">${ex.target}</div>
      </div>
      <div class="ex-note">${ex.note}</div>
      ${lastHtml}
      <div class="series-grid">${inputs}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="bar-${idx}" style="width:0%"></div></div>
      <button class="timer-btn" onclick="startTimer(${idx})">⏱ Pauza 90 sek</button>
      <button class="ex-done-btn" id="done-${idx}" onclick="markDone(${idx})">✓ Označiť ako hotové</button>
    `;
    list.appendChild(card);

    for (let i=0; i<ex.series; i++) {
      setTimeout(() => {
        const inp = document.getElementById(`ex-${idx}-s${i}`);
        if (inp) inp.addEventListener('input', () => updateBar(idx));
      }, 0);
    }
  });
}

function updateBar(idx) {
  const ex = resolvedExercises[idx];
  let filled = 0;
  for (let i=0; i<ex.series; i++) {
    const v = document.getElementById(`ex-${idx}-s${i}`)?.value;
    if (v && parseInt(v) > 0) filled++;
  }
  const bar = document.getElementById('bar-'+idx);
  if (bar) bar.style.width = (filled/ex.series*100)+'%';
}

function markDone(idx) {
  const btn = document.getElementById('done-'+idx);
  const card = document.getElementById('card-'+idx);
  if (btn.classList.contains('done')) {
    btn.classList.remove('done'); btn.textContent = '✓ Označiť ako hotové';
    card.classList.remove('done'); doneMap[idx] = false;
  } else {
    btn.classList.add('done'); btn.textContent = '✓ Dokončené';
    card.classList.add('done'); doneMap[idx] = true;
    document.getElementById('bar-'+idx).style.width = '100%';
  }
}

function saveTraining() {
  if (!currentDay) return;
  const exercises = resolvedExercises.map((ex, idx) => {
    const series = [];
    for (let i=0; i<ex.series; i++) {
      series.push(document.getElementById(`ex-${idx}-s${i}`)?.value || '');
    }
    return { id: ex.id, name: ex.name, series };
  });
  const history = gS('kt_history', []);
  history.push({ date: todayISO(), day: currentDay, exercises });
  sS('kt_history', history);
  showToast('Tréning uložený! 💪');
  selectDay(currentDay);
}

// ═══════════════════════════════ TIMER
let timerInterval = null;
let timerSeconds = 0;
const TIMER_TOTAL = 90;
const RING_CIRC = 2 * Math.PI * 68; // 427.26

function startTimer(idx) {
  timerSeconds = TIMER_TOTAL;
  const ring = document.getElementById('timerRing');
  const count = document.getElementById('timerCount');
  count.textContent = timerSeconds;
  count.className = 'timer-count';
  ring.className = 'timer-ring-progress';
  ring.style.strokeDashoffset = '0';
  document.getElementById('timerOverlay').classList.add('show');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds--;
    count.textContent = timerSeconds;
    const progress = 1 - (timerSeconds / TIMER_TOTAL);
    ring.style.strokeDashoffset = (RING_CIRC * progress).toFixed(1);
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      count.textContent = '✓';
      count.className = 'timer-count done-c';
      ring.className = 'timer-ring-progress done-ring';
      ring.style.strokeDashoffset = RING_CIRC.toFixed(1);
      setTimeout(() => document.getElementById('timerOverlay').classList.remove('show'), 1400);
    }
  }, 1000);
}

function skipTimer() { clearInterval(timerInterval); document.getElementById('timerOverlay').classList.remove('show'); }
function stopTimer() { clearInterval(timerInterval); document.getElementById('timerOverlay').classList.remove('show'); }

// ═══════════════════════════════ PROGRESSION
function renderProgression() {
  ['kliky','pritahy','drepy','core'].forEach(key => {
    const group = PROG_DEFS[key];
    const current = getProgLevel(key);
    const container = document.getElementById('prog-'+key);
    container.innerHTML = '';

    // Update meter
    const pct = Math.round((current / group.levels.length) * 100);
    const meterFill = document.getElementById('meter-'+key);
    const meterTxt = document.getElementById('meter-'+key+'-txt');
    if (meterFill) meterFill.style.width = pct+'%';
    if (meterTxt) meterTxt.textContent = `${current}/${group.levels.length}`;

    group.levels.forEach((lv, idx) => {
      const isCur = idx === current;
      const isDone = idx < current;
      const div = document.createElement('div');
      div.className = 'prog-item' + (isCur?' current':'') + (isDone?' completed':'');
      div.innerHTML = `
        <div class="prog-num">${isDone?'✓':idx+1}</div>
        <div class="prog-variant">${lv.name}</div>
        <div class="prog-target">${lv.target}</div>
        ${isCur?'<span class="prog-badge badge-cur">AKTUÁLNY</span>':''}
        ${isDone?'<span class="prog-badge badge-done">SPLNENÝ</span>':''}
      `;
      if (isCur && idx < group.levels.length-1) {
        div.addEventListener('click', () => {
          if (confirm(`Splnil si: "${lv.name}"?\n${lv.target}\n\nTréning sa automaticky aktualizuje.`)) {
            setProgLevel(key, current+1);
            renderProgression();
            showToast('Postup! Tréning aktualizovaný 🔓');
          }
        });
      }
      container.appendChild(div);
    });
  });
}

// ═══════════════════════════════ HISTORY
function renderHistory() {
  const history = gS('kt_history', []);
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if (!history.length) {
    container.innerHTML = `<div class="history-empty"><span class="big">📋</span>Zatiaľ žiadna história.<br>Odtrénuj prvý tréning!</div>`;
    return;
  }
  [...history].reverse().forEach((entry, rIdx) => {
    const idx = history.length-1-rIdx;
    const div = document.createElement('div');
    div.className = 'history-entry';
    const exRows = entry.exercises.map(ex => {
      const vals = ex.series.map(v=>`<span class="hist-val">${v||'—'}</span>`).join('');
      return `<div class="hist-row"><span class="hist-name">${ex.name}</span><div class="hist-vals">${vals}</div></div>`;
    }).join('');
    div.innerHTML = `
      <div class="history-hdr">
        <span class="hist-badge badge-${entry.day.toLowerCase()}">Tréning ${entry.day}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="hist-date">${fmtDate(entry.date)}</span>
          <button class="hist-del" onclick="deleteEntry(${idx})">✕</button>
        </div>
      </div>
      <div class="hist-exercises">${exRows}</div>
    `;
    container.appendChild(div);
  });
}

function deleteEntry(idx) {
  if (!confirm('Vymazať tento záznam?')) return;
  const history = gS('kt_history', []);
  history.splice(idx, 1);
  sS('kt_history', history);
  renderHistory();
  showToast('Záznam vymazaný');
}

// ═══════════════════════════════ CHART
function getAllExerciseNames() {
  const history = gS('kt_history', []);
  const names = new Set();
  history.forEach(entry => entry.exercises.forEach(ex => names.add(ex.name)));
  return [...names];
}

function populateChartSelect() {
  const sel = document.getElementById('chartExSelect');
  const names = getAllExerciseNames();
  const current = sel.value;
  sel.innerHTML = names.length
    ? names.map(n=>`<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join('')
    : '<option>Žiadne dáta</option>';
}

let chartInstance = null;

function renderChart() {
  const sel = document.getElementById('chartExSelect');
  const exName = sel.value;
  const history = gS('kt_history', []);
  const canvas = document.getElementById('myChart');
  const empty = document.getElementById('chartEmpty');

  const points = [];
  history.forEach(entry => {
    const ex = entry.exercises.find(e => e.name === exName);
    if (ex) {
      const vals = ex.series.map(v => parseInt(v)||0).filter(v=>v>0);
      if (vals.length) {
        const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
        points.push({ date: entry.date, avg });
      }
    }
  });

  if (!points.length) { canvas.style.display='none'; empty.style.display='block'; return; }
  canvas.style.display='block'; empty.style.display='none';

  const labels = points.map(p => new Date(p.date).toLocaleDateString('sk-SK',{day:'numeric',month:'short'}));
  const data = points.map(p=>p.avg);

  if (chartInstance) { chartInstance.destroy(); chartInstance=null; }

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 320;
  canvas.width = W; canvas.height = 220;
  ctx.clearRect(0,0,W,220);

  if (data.length < 2) {
    ctx.fillStyle='#6b6b80'; ctx.font='13px Cabinet Grotesk, sans-serif';
    ctx.fillText('Potrebuješ aspoň 2 záznamy pre graf.',16,110); return;
  }

  const pad = { l:40, r:16, t:20, b:40 };
  const gW = W - pad.l - pad.r;
  const gH = 220 - pad.t - pad.b;
  const maxV = Math.max(...data) + 2;
  const minV = Math.max(0, Math.min(...data)-2);
  const range = maxV - minV || 1;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(f => {
    const y = pad.t + gH*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+gW,y); ctx.stroke();
    const val = Math.round(minV + range*f);
    ctx.fillStyle='#6b6b80'; ctx.font='10px DM Mono, monospace'; ctx.textAlign='right';
    ctx.fillText(val, pad.l-8, y+4);
  });

  const pts = data.map((v,i) => ({
    x: pad.l + (i/(data.length-1))*gW,
    y: pad.t + gH*(1-(v-minV)/range)
  }));

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+gH);
  grad.addColorStop(0, 'rgba(232,255,71,0.15)');
  grad.addColorStop(1, 'rgba(232,255,71,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.t+gH);
  ctx.lineTo(pts[0].x, pad.t+gH);
  ctx.closePath(); ctx.fill();

  // Line
  ctx.strokeStyle='#e8ff47'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();

  // Dots
  pts.forEach((p,i) => {
    ctx.fillStyle='#e8ff47';
    ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0c0c0e';
    ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fill();
  });

  // X labels
  ctx.fillStyle='#6b6b80'; ctx.font='9px DM Mono, monospace'; ctx.textAlign='center';
  pts.forEach((p,i) => {
    if (data.length <= 8 || i%(Math.ceil(data.length/6))===0) {
      ctx.fillText(labels[i], p.x, 220-pad.b+16);
    }
  });
}

// ═══════════════════════════════ TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

selectDay('A');
