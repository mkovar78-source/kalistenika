<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KaliTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --a: #ff4d6d;
  --b: #4dffb4;
  --c: #4d9fff;
  --d: #ffb84d;
  --purple: #b44dff;
  --text: #e8e8f0;
  --dim: #7070a0;
  --muted: #404060;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }

/* HEADER */
.app-header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,15,0.97); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.app-title { font-size:16px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
.app-title span { color:var(--a); }
.header-date { font-family:var(--mono); font-size:11px; color:var(--dim); }

/* NAV */
.nav-tabs {
  display:flex; background:var(--surface);
  border-bottom:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab {
  flex:1; min-width:70px; padding:11px 6px;
  text-align:center; font-size:10px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  color:var(--dim); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s;
  white-space:nowrap;
}
.nav-tab.active { color:var(--text); border-bottom-color:var(--a); }

/* PAGES */
.page { display:none; padding:14px; }
.page.active { display:block; }

/* DAY SELECTOR */
.day-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.day-btn {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.2s;
}
.day-btn.sel-a { border-color:var(--a); background:rgba(255,77,109,0.08); }
.day-btn.sel-b { border-color:var(--b); background:rgba(77,255,180,0.08); }
.day-btn.sel-c { border-color:var(--c); background:rgba(77,159,255,0.08); }
.day-letter { font-size:20px; font-weight:800; display:block; margin-bottom:2px; }
.sel-a .day-letter { color:var(--a); }
.sel-b .day-letter { color:var(--b); }
.sel-c .day-letter { color:var(--c); }
.day-sub { font-size:9px; color:var(--dim); letter-spacing:0.05em; text-transform:uppercase; }

/* LEVEL BADGE */
.level-badge {
  display:inline-block; font-size:9px; font-weight:700;
  padding:2px 8px; border-radius:20px; margin-left:6px;
  background:rgba(255,184,77,0.15); color:var(--d);
  letter-spacing:0.04em; text-transform:uppercase; vertical-align:middle;
}

/* EXERCISE CARDS */
.exercise-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color 0.2s;
}
.exercise-card.done { border-color:var(--b); opacity:0.65; }
.ex-header { padding:12px 14px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.ex-name { font-size:13px; font-weight:700; line-height:1.3; flex:1; }
.ex-target {
  font-family:var(--mono); font-size:10px; color:var(--dim);
  background:var(--surface2); padding:3px 7px; border-radius:20px;
  white-space:nowrap; flex-shrink:0;
}
.ex-note { font-size:11px; color:var(--dim); padding:0 14px 8px; line-height:1.4; }
.ex-last { font-family:var(--mono); font-size:10px; color:var(--d); padding:0 14px 8px; }
.ex-last span { color:var(--muted); }

/* SERIES */
.series-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 14px 10px; }
.serie-wrap { text-align:center; }
.serie-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; font-family:var(--mono); }
.serie-input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:var(--mono);
  font-size:22px; font-weight:700; text-align:center; padding:10px 4px; outline:none;
  -moz-appearance:textfield;
}
.serie-input::-webkit-outer-spin-button, .serie-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.serie-input:focus { border-color:var(--a); }

/* PROGRESS BAR */
.prog-bar-wrap { background:var(--surface2); border-radius:4px; height:3px; margin:0 14px 10px; overflow:hidden; }
.prog-bar-fill { height:100%; background:var(--b); border-radius:4px; transition:width 0.4s ease; }

/* DONE BTN */
.ex-done-btn {
  width:calc(100% - 28px); margin:0 14px 12px;
  padding:9px; background:transparent; border:1px solid var(--border);
  border-radius:8px; color:var(--dim); font-family:var(--sans);
  font-size:11px; font-weight:700; letter-spacing:0.05em;
  text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.ex-done-btn.done { background:rgba(77,255,180,0.1); border-color:var(--b); color:var(--b); }

/* TIMER BTN */
.timer-btn {
  width:calc(100% - 28px); margin:0 14px 6px;
  padding:8px; background:rgba(255,184,77,0.08); border:1px solid rgba(255,184,77,0.3);
  border-radius:8px; color:var(--d); font-family:var(--sans);
  font-size:11px; font-weight:700; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.timer-btn:active { opacity:0.7; }

/* FLOATING TIMER */
.timer-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:200; display:none; align-items:center; justify-content:center;
}
.timer-overlay.show { display:flex; }
.timer-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; padding:32px 40px; text-align:center; min-width:260px;
}
.timer-label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.timer-count { font-family:var(--mono); font-size:64px; font-weight:700; color:var(--d); line-height:1; margin-bottom:20px; }
.timer-count.done-c { color:var(--b); }
.timer-actions { display:flex; gap:10px; justify-content:center; }
.timer-skip {
  padding:10px 20px; background:transparent; border:1px solid var(--border);
  border-radius:10px; color:var(--dim); font-family:var(--sans);
  font-size:12px; font-weight:700; cursor:pointer;
}
.timer-stop {
  padding:10px 20px; background:var(--a); border:none;
  border-radius:10px; color:white; font-family:var(--sans);
  font-size:12px; font-weight:700; cursor:pointer;
}

/* SAVE BTN */
.save-btn {
  width:100%; padding:14px; background:var(--a); border:none;
  border-radius:14px; color:white; font-family:var(--sans);
  font-size:13px; font-weight:800; letter-spacing:0.06em;
  text-transform:uppercase; cursor:pointer; margin-top:6px; transition:opacity 0.2s;
}
.save-btn:active { opacity:0.8; }

/* SECTION LABEL */
.sec-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; margin-top:2px; }

/* PROGRESSION PAGE */
.prog-group { margin-bottom:20px; }
.prog-group-title { font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--border); }
.prog-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 12px; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; margin-bottom:5px; transition:all 0.2s;
}
.prog-item.current { border-color:var(--d); background:rgba(255,184,77,0.06); cursor:pointer; }
.prog-item.completed { opacity:0.35; }
.prog-num { font-family:var(--mono); font-size:11px; color:var(--muted); width:16px; flex-shrink:0; text-align:center; }
.prog-item.current .prog-num { color:var(--d); font-weight:700; }
.prog-item.completed .prog-num { color:var(--b); }
.prog-variant { font-size:12px; font-weight:600; flex:1; }
.prog-target { font-family:var(--mono); font-size:9px; color:var(--dim); text-align:right; }
.prog-badge { font-size:9px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:2px 7px; border-radius:20px; flex-shrink:0; }
.badge-cur { background:rgba(255,184,77,0.15); color:var(--d); }
.badge-done { background:rgba(77,255,180,0.1); color:var(--b); }

/* HISTORY */
.history-empty { text-align:center; color:var(--muted); font-size:13px; padding:50px 20px; line-height:1.8; }
.history-empty .big { font-size:36px; margin-bottom:10px; }
.history-entry { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; }
.history-hdr { padding:10px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
.hist-badge { font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px; }
.badge-a { background:rgba(255,77,109,0.15); color:var(--a); }
.badge-b { background:rgba(77,255,180,0.1); color:var(--b); }
.badge-c { background:rgba(77,159,255,0.1); color:var(--c); }
.hist-date { font-family:var(--mono); font-size:10px; color:var(--dim); }
.hist-exercises { padding:8px 14px 12px; }
.hist-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid var(--border); font-size:11px; }
.hist-row:last-child { border-bottom:none; }
.hist-name { color:var(--dim); flex:1; font-size:11px; }
.hist-vals { font-family:var(--mono); font-size:10px; display:flex; gap:4px; }
.hist-val { background:var(--surface2); padding:2px 5px; border-radius:4px; }
.hist-del { background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; padding:2px 5px; margin-left:6px; }

/* CHART */
.chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:14px; }
.chart-title { font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px; }
.chart-select {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:var(--sans); font-size:12px;
  padding:8px 10px; outline:none; margin-bottom:12px;
}
canvas { width:100% !important; border-radius:8px; }
.chart-empty { text-align:center; color:var(--muted); font-size:12px; padding:30px; }

/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--b); color:#0a0a0f; font-weight:800; font-size:12px;
  padding:11px 22px; border-radius:30px; opacity:0; transition:all 0.3s;
  z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">KALI<span>●</span>TRACK</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showPage('train',this)">Tréning</div>
  <div class="nav-tab" onclick="showPage('progress',this)">Progression</div>
  <div class="nav-tab" onclick="showPage('history',this)">História</div>
  <div class="nav-tab" onclick="showPage('stats',this)">Graf</div>
</div>

<!-- TRÉNING -->
<div class="page active" id="page-train">
  <div class="day-selector">
    <div class="day-btn" id="btn-a" onclick="selectDay('A')">
      <span class="day-letter">A</span>
      <span class="day-sub">Tlaky</span>
    </div>
    <div class="day-btn" id="btn-b" onclick="selectDay('B')">
      <span class="day-letter">B</span>
      <span class="day-sub">Ťahy</span>
    </div>
    <div class="day-btn" id="btn-c" onclick="selectDay('C')">
      <span class="day-letter">C</span>
      <span class="day-sub">Nohy</span>
    </div>
  </div>
  <div class="sec-label" id="trainLabel">Vyber tréning</div>
  <div id="exerciseList"></div>
  <button class="save-btn" id="saveBtn" onclick="saveTraining()" style="display:none">💾 Uložiť tréning</button>
</div>

<!-- PROGRESSION -->
<div class="page" id="page-progress">
  <div class="prog-group"><div class="prog-group-title">💪 Kľuky</div><div id="prog-kliky"></div></div>
  <div class="prog-group"><div class="prog-group-title">🏋️ Príťahy / Ťahy</div><div id="prog-pritahy"></div></div>
  <div class="prog-group"><div class="prog-group-title">🦵 Drepy</div><div id="prog-drepy"></div></div>
  <div class="prog-group"><div class="prog-group-title">🔥 Core</div><div id="prog-core"></div></div>
</div>

<!-- HISTÓRIA -->
<div class="page" id="page-history">
  <div id="historyList"></div>
</div>

<!-- GRAF -->
<div class="page" id="page-stats">
  <div class="chart-wrap">
    <div class="chart-title">Progres opakovaní</div>
    <select class="chart-select" id="chartExSelect" onchange="renderChart()"></select>
    <canvas id="myChart" height="200"></canvas>
    <div class="chart-empty" id="chartEmpty" style="display:none">Žiadne dáta pre tento pohyb.</div>
  </div>
</div>

<!-- TIMER OVERLAY -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="timer-label">Pauza medzi sériami</div>
    <div class="timer-count" id="timerCount">90</div>
    <div class="timer-actions">
      <button class="timer-skip" onclick="skipTimer()">Preskočiť</button>
      <button class="timer-stop" onclick="stopTimer()">Zastaviť</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════ PROGRESSION DATA
const PROG_DEFS = {
  kliky: {
    name: 'Kľuky',
    levels: [
      { name:'Kľuky o stenu',          target:'3×15 čisto', serie:3, reps:15 },
      { name:'Kľuky na kolenách',       target:'3×15 čisto', serie:3, reps:15 },
      { name:'Normálne kľuky',          target:'3×15 čisto', serie:3, reps:15 },
      { name:'Wide grip kľuky',         target:'3×15 čisto', serie:3, reps:15 },
      { name:'Diamond kľuky',           target:'3×15 čisto', serie:3, reps:15 },
      { name:'Archer kľuky',            target:'3×12 čisto', serie:3, reps:12 },
      { name:'Pike push-up',            target:'3×12 čisto', serie:3, reps:12 },
      { name:'Pseudo planche',          target:'3×10 čisto', serie:3, reps:10 },
      { name:'Planche push-up 🔥',      target:'Roky práce', serie:3, reps:10 },
    ]
  },
  pritahy: {
    name: 'Príťahy',
    levels: [
      { name:'Reverse snow angel',      target:'3×15 čisto', serie:3, reps:15 },
      { name:'Wall angels',             target:'3×12 čisto', serie:3, reps:12 },
      { name:'Zhyby s odrazom',         target:'3×8 čisto',  serie:3, reps:8  },
      { name:'Negatívne zhyby',         target:'3×5 čisto',  serie:3, reps:5  },
      { name:'Zhyby nadhmat',           target:'3×8 čisto',  serie:3, reps:8  },
      { name:'Chin-up (podhmat)',        target:'3×10 čisto', serie:3, reps:10 },
    ]
  },
  drepy: {
    name: 'Drepy',
    levels: [
      { name:'Wall squat',              target:'3×15 čisto', serie:3, reps:15 },
      { name:'Normálny drep',           target:'3×15 čisto', serie:3, reps:15 },
      { name:'Drep s pauzou 3 sek',     target:'3×12 čisto', serie:3, reps:12 },
      { name:'Bulgarian split squat',   target:'3×10/noha',  serie:3, reps:10 },
      { name:'Skokový drep',            target:'3×12 čisto', serie:3, reps:12 },
      { name:'Pistol squat s oporou',   target:'3×8/noha',   serie:3, reps:8  },
      { name:'Pistol squat 🔥',         target:'3×8/noha',   serie:3, reps:8  },
    ]
  },
  core: {
    name: 'Core',
    levels: [
      { name:'Plank na kolenách',       target:'3×30 sek',   serie:3, reps:30 },
      { name:'Plank plný',              target:'3×45 sek',   serie:3, reps:45 },
      { name:'Plank s výdržou nôh',     target:'3×30 sek',   serie:3, reps:30 },
      { name:'Hollow body hold',        target:'3×30 sek',   serie:3, reps:30 },
      { name:'L-sit na stoličkách',     target:'3×10 sek',   serie:3, reps:10 },
      { name:'L-sit na podlahe',        target:'3×15 sek',   serie:3, reps:15 },
      { name:'Dragon flag 🔥',          target:'3×5 čisto',  serie:3, reps:5  },
    ]
  }
};

// Mapovanie: ktorý pohyb v ktorom tréningu čerpá z ktorej progression skupiny a indexu v skupine
const TRAINING_STRUCTURE = {
  A: {
    name: 'Tréning A — Tlaky + Core',
    color: 'a',
    exercises: [
      { progGroup:'kliky',   note:'Začni ľahším variantom. Čistá technika.' },
      { progGroup:'kliky',   note:'Keď prvý variant ide ľahko — si tu.', offset:1 },
      { id:'dips',           name:'Triceps dips na gauči', target:'F1:2×6–8 / F2:3×10–12', note:'Ruky za sebou, lakte dozadu.', series:3 },
      { progGroup:'core',    note:'Rovná chrbtica, nezadržuj dych.' },
      { id:'deadbug',        name:'Mŕtvy chrobák', target:'F1:2×5/str / F2:3×8/str', note:'Chrbát tlač k zemi, pomaly.', series:3 },
    ]
  },
  B: {
    name: 'Tréning B — Ťahy + Chrbát',
    color: 'b',
    exercises: [
      { progGroup:'pritahy', note:'Ľahni na brucho, oblúkový pohyb rukami.' },
      { progGroup:'pritahy', note:'Chrbát k stene, dvíhaj ruky nahor.', offset:1 },
      { id:'superman',       name:'Superman hold', target:'F1:2×8 / F2:3×12', note:'Drž 2 sek hore, pomaly dole.', series:3 },
      { progGroup:'core',    note:'Telo v línii, opri sa o koleno.', offset:1 },
      { progGroup:'core',    note:'Chrbát plochý k zemi, nohy nízko.', offset:2 },
      { id:'shoulder-tap',   name:'Shoulder tap plank', target:'F2:2×6/str', note:'Až vo fáze 2.', series:2 },
    ]
  },
  C: {
    name: 'Tréning C — Nohy + Celé telo',
    color: 'c',
    exercises: [
      { progGroup:'drepy',   note:'Chrbát o stenu, kolená 90°.' },
      { progGroup:'drepy',   note:'Keď wall squat ide ľahko.', offset:1 },
      { id:'vypady',         name:'Výpad — statický', target:'F1:2×6/noha / F2:3×8/noha', note:'Stoj na mieste, trup vzpriamený.', series:3 },
      { id:'glute',          name:'Glute bridge', target:'F1:2×10 / F2:3×15', note:'Stlač zadok, drž 1 sek.', series:3 },
      { id:'sldl',           name:'Single leg deadlift', target:'F2:2×6/noha', note:'Pomaly, rovná chrbtica, opora.', series:2 },
      { id:'lytka',          name:'Výpony na špičky', target:'F1:2×15 / F2:3×20', note:'Pomalé spúšťanie = väčší efekt.', series:3 },
    ]
  }
};

// ═══════════════════════════════ STORAGE
function gS(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }
function sS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

function getProgLevel(key){ return gS('kt_prog_'+key, 0); }
function setProgLevel(key, lv){ sS('kt_prog_'+key, lv); }

// ═══════════════════════════════ RESOLVE EXERCISE FROM PROGRESSION
function resolveExercise(exDef) {
  if (exDef.id) {
    // Fixed exercise
    return { id: exDef.id, name: exDef.name, target: exDef.target, note: exDef.note, series: exDef.series || 3 };
  }
  // Progression-linked
  const group = PROG_DEFS[exDef.progGroup];
  const currentLevel = getProgLevel(exDef.progGroup);
  const levelIndex = Math.min(currentLevel + (exDef.offset || 0), group.levels.length - 1);
  const level = group.levels[levelIndex];
  const isOffset = exDef.offset && exDef.offset > 0;
  return {
    id: exDef.progGroup + '_' + levelIndex,
    name: level.name + (isOffset ? '' : ''),
    target: level.target,
    note: exDef.note,
    series: level.serie || 3,
    progGroup: exDef.progGroup,
    levelIndex,
    isProgLinked: true,
  };
}

// ═══════════════════════════════ NAV
function showPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if (el) el.classList.add('active');
  if (page==='history') renderHistory();
  if (page==='progress') renderProgression();
  if (page==='stats') { populateChartSelect(); renderChart(); }
}

// Date
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('sk-SK',{weekday:'short',day:'numeric',month:'short'});

function todayISO(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('sk-SK',{day:'numeric',month:'short',year:'numeric'}); }

// ═══════════════════════════════ TRAINING
let currentDay = null;
let resolvedExercises = [];
let doneMap = {};

function selectDay(day) {
  currentDay = day;
  doneMap = {};
  ['A','B','C'].forEach(d => {
    const btn = document.getElementById('btn-'+d.toLowerCase());
    btn.className = 'day-btn' + (d===day ? ' sel-'+d.toLowerCase() : '');
  });
  const t = TRAINING_STRUCTURE[day];
  document.getElementById('trainLabel').textContent = t.name;
  resolvedExercises = t.exercises.map(ex => resolveExercise(ex));
  renderExercises();
  document.getElementById('saveBtn').style.display = 'block';
}

function getLastSeries(day, exId) {
  const history = gS('kt_history', []);
  for (let i = history.length-1; i >= 0; i--) {
    if (history[i].day === day) {
      const ex = history[i].exercises.find(e => e.id === exId);
      if (ex) return ex.series;
    }
  }
  return null;
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  resolvedExercises.forEach((ex, idx) => {
    const last = getLastSeries(currentDay, ex.id);
    const lastHtml = last
      ? `<div class="ex-last"><span>Minule: </span>${last.map(v=>v||'—').join(' / ')}</div>` : '';
    const progBadge = ex.isProgLinked
      ? `<span class="level-badge">Lv.${ex.levelIndex+1}</span>` : '';
    let inputs = '';
    for (let i=0; i<ex.series; i++) {
      inputs += `<div class="serie-wrap">
        <div class="serie-label">Séria ${i+1}</div>
        <input class="serie-input" type="number" min="0" max="99" placeholder="0"
          id="ex-${idx}-s${i}" inputmode="numeric">
      </div>`;
    }
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = 'card-'+idx;
    card.innerHTML = `
      <div class="ex-header">
        <div class="ex-name">${ex.name}${progBadge}</div>
        <div class="ex-target">${ex.target}</div>
      </div>
      <div class="ex-note">${ex.note}</div>
      ${lastHtml}
      <div class="series-grid">${inputs}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="bar-${idx}" style="width:0%"></div></div>
      <button class="timer-btn" onclick="startTimer(${idx})">⏱ Spustiť pauzu <span style="font-family:var(--mono);font-size:10px">90 sek</span></button>
      <button class="ex-done-btn" id="done-${idx}" onclick="markDone(${idx})">✓ Hotovo</button>
    `;
    list.appendChild(card);
    for (let i=0; i<ex.series; i++) {
      setTimeout(() => {
        const inp = document.getElementById(`ex-${idx}-s${i}`);
        if (inp) inp.addEventListener('input', () => updateBar(idx));
      }, 0);
    }
  });
}

function updateBar(idx) {
  const ex = resolvedExercises[idx];
  let filled = 0;
  for (let i=0; i<ex.series; i++) {
    const v = document.getElementById(`ex-${idx}-s${i}`)?.value;
    if (v && parseInt(v) > 0) filled++;
  }
  const bar = document.getElementById('bar-'+idx);
  if (bar) bar.style.width = (filled/ex.series*100)+'%';
}

function markDone(idx) {
  const btn = document.getElementById('done-'+idx);
  const card = document.getElementById('card-'+idx);
  if (btn.classList.contains('done')) {
    btn.classList.remove('done'); btn.textContent = '✓ Hotovo';
    card.classList.remove('done'); doneMap[idx] = false;
  } else {
    btn.classList.add('done'); btn.textContent = '✓ Dokončené';
    card.classList.add('done'); doneMap[idx] = true;
    document.getElementById('bar-'+idx).style.width = '100%';
  }
}

function saveTraining() {
  if (!currentDay) return;
  const exercises = resolvedExercises.map((ex, idx) => {
    const series = [];
    for (let i=0; i<ex.series; i++) {
      series.push(document.getElementById(`ex-${idx}-s${i}`)?.value || '');
    }
    return { id: ex.id, name: ex.name, series };
  });
  const history = gS('kt_history', []);
  history.push({ date: todayISO(), day: currentDay, exercises });
  sS('kt_history', history);
  showToast('Tréning uložený! 💪');
  selectDay(currentDay);
}

// ═══════════════════════════════ TIMER
let timerInterval = null;
let timerSeconds = 0;

function startTimer(idx) {
  timerSeconds = 90;
  document.getElementById('timerCount').textContent = timerSeconds;
  document.getElementById('timerCount').className = 'timer-count';
  document.getElementById('timerOverlay').classList.add('show');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds--;
    document.getElementById('timerCount').textContent = timerSeconds;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timerCount').textContent = '✓';
      document.getElementById('timerCount').className = 'timer-count done-c';
      setTimeout(() => document.getElementById('timerOverlay').classList.remove('show'), 1200);
    }
  }, 1000);
}

function skipTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').classList.remove('show');
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').classList.remove('show');
}

// ═══════════════════════════════ PROGRESSION
function renderProgression() {
  ['kliky','pritahy','drepy','core'].forEach(key => {
    const group = PROG_DEFS[key];
    const current = getProgLevel(key);
    const container = document.getElementById('prog-'+key);
    container.innerHTML = '';
    group.levels.forEach((lv, idx) => {
      const isCur = idx === current;
      const isDone = idx < current;
      const div = document.createElement('div');
      div.className = 'prog-item' + (isCur?' current':'') + (isDone?' completed':'');
      div.innerHTML = `
        <div class="prog-num">${isDone?'✓':idx+1}</div>
        <div class="prog-variant">${lv.name}</div>
        <div class="prog-target">${lv.target}</div>
        ${isCur?'<span class="prog-badge badge-cur">AKTUÁLNY</span>':''}
        ${isDone?'<span class="prog-badge badge-done">SPLNENÝ</span>':''}
      `;
      if (isCur && idx < group.levels.length-1) {
        div.addEventListener('click', () => {
          if (confirm(`Splnil si: "${lv.name}"?\n${lv.target}\n\nTréning sa automaticky aktualizuje.`)) {
            setProgLevel(key, current+1);
            renderProgression();
            showToast('Postup! Tréning aktualizovaný 🔓');
          }
        });
      }
      container.appendChild(div);
    });
  });
}

// ═══════════════════════════════ HISTORY
function renderHistory() {
  const history = gS('kt_history', []);
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if (!history.length) {
    container.innerHTML = `<div class="history-empty"><div class="big">📋</div>Zatiaľ žiadna história.<br>Odtrénuj prvý tréning!</div>`;
    return;
  }
  [...history].reverse().forEach((entry, rIdx) => {
    const idx = history.length-1-rIdx;
    const t = TRAINING_STRUCTURE[entry.day];
    const div = document.createElement('div');
    div.className = 'history-entry';
    const exRows = entry.exercises.map(ex => {
      const vals = ex.series.map(v=>`<span class="hist-val">${v||'—'}</span>`).join('');
      return `<div class="hist-row"><span class="hist-name">${ex.name}</span><div class="hist-vals">${vals}</div></div>`;
    }).join('');
    div.innerHTML = `
      <div class="history-hdr">
        <span class="hist-badge badge-${entry.day.toLowerCase()}">Tréning ${entry.day}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="hist-date">${fmtDate(entry.date)}</span>
          <button class="hist-del" onclick="deleteEntry(${idx})">✕</button>
        </div>
      </div>
      <div class="hist-exercises">${exRows}</div>
    `;
    container.appendChild(div);
  });
}

function deleteEntry(idx) {
  if (!confirm('Vymazať tento záznam?')) return;
  const history = gS('kt_history', []);
  history.splice(idx, 1);
  sS('kt_history', history);
  renderHistory();
  showToast('Záznam vymazaný');
}

// ═══════════════════════════════ CHART
function getAllExerciseNames() {
  const history = gS('kt_history', []);
  const names = new Set();
  history.forEach(entry => entry.exercises.forEach(ex => names.add(ex.name)));
  return [...names];
}

function populateChartSelect() {
  const sel = document.getElementById('chartExSelect');
  const names = getAllExerciseNames();
  const current = sel.value;
  sel.innerHTML = names.length
    ? names.map(n=>`<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join('')
    : '<option>Žiadne dáta</option>';
}

let chartInstance = null;

function renderChart() {
  const sel = document.getElementById('chartExSelect');
  const exName = sel.value;
  const history = gS('kt_history', []);
  const canvas = document.getElementById('myChart');
  const empty = document.getElementById('chartEmpty');

  const points = [];
  history.forEach(entry => {
    const ex = entry.exercises.find(e => e.name === exName);
    if (ex) {
      const vals = ex.series.map(v => parseInt(v)||0).filter(v=>v>0);
      if (vals.length) {
        const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
        points.push({ date: entry.date, avg });
      }
    }
  });

  if (!points.length) {
    canvas.style.display='none'; empty.style.display='block'; return;
  }
  canvas.style.display='block'; empty.style.display='none';

  const labels = points.map(p => {
    const d = new Date(p.date);
    return d.toLocaleDateString('sk-SK',{day:'numeric',month:'short'});
  });
  const data = points.map(p=>p.avg);

  if (chartInstance) { chartInstance.destroy(); chartInstance=null; }

  // Simple canvas chart
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 300;
  canvas.width = W; canvas.height = 200;
  ctx.clearRect(0,0,W,200);

  if (data.length < 2) {
    ctx.fillStyle='#7070a0'; ctx.font='12px Syne';
    ctx.fillText('Potrebuješ aspoň 2 záznamy pre graf.',20,100); return;
  }

  const pad = { l:40, r:16, t:16, b:36 };
  const gW = W - pad.l - pad.r;
  const gH = 200 - pad.t - pad.b;
  const maxV = Math.max(...data) + 2;
  const minV = Math.max(0, Math.min(...data)-2);
  const range = maxV - minV || 1;

  // Grid lines
  ctx.strokeStyle='#2a2a3a'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(f => {
    const y = pad.t + gH*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+gW,y); ctx.stroke();
    const val = Math.round(minV + range*f);
    ctx.fillStyle='#7070a0'; ctx.font='10px Space Mono'; ctx.textAlign='right';
    ctx.fillText(val, pad.l-6, y+4);
  });

  // Line
  const pts = data.map((v,i) => ({
    x: pad.l + (i/(data.length-1))*gW,
    y: pad.t + gH*(1-(v-minV)/range)
  }));

  ctx.strokeStyle='#ff4d6d'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();

  // Fill
  ctx.fillStyle='rgba(255,77,109,0.08)';
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.t+gH);
  ctx.lineTo(pts[0].x, pad.t+gH);
  ctx.closePath(); ctx.fill();

  // Dots
  pts.forEach((p,i) => {
    ctx.fillStyle='#ff4d6d';
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a0f';
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });

  // Labels
  ctx.fillStyle='#7070a0'; ctx.font='9px Space Mono'; ctx.textAlign='center';
  pts.forEach((p,i) => {
    if (data.length <= 8 || i%(Math.ceil(data.length/6))===0) {
      ctx.fillText(labels[i], p.x, 200-pad.b+14);
    }
  });
}

// ═══════════════════════════════ TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

selectDay('A');
